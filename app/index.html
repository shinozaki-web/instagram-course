      width: 280px;

      background: #1a1a1a;
      color: #fff;

      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      overflow-y: auto;

      padding: 24px 20px 16px;
      border-bottom: 1px solid #333;
    }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      color: #fff;
    }

    #progress-bar-wrap {
      margin-top: 12px;
      background: #333;
      border-radius: 4px;
      height: 6px;
    }

    #progress-bar {
      height: 6px;
      background: #f97316;
      border-radius: 4px;
      transition: width 0.4s;
      width: 0%;
    }

    #progress-text {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
    }

    nav { padding: 12px 0; }

    .chapter-group { margin-bottom: 4px; }

    .chapter-label {
      font-size: 10px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.08em;
      padding: 8px 20px 4px;
      text-transform: uppercase;
    }

    .lesson-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      color: #ccc;
      font-size: 13px;
      padding: 10px 20px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .lesson-btn:hover { background: #2a2a2a; color: #fff; }
    .lesson-btn.active { background: #f97316; color: #fff; }
    .lesson-btn.done .check { color: #4ade80; }

    .check {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: #555;
    }

    /* メインエリア */
    #main {
      margin-left: 280px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #topbar-title { font-size: 15px; font-weight: 600; }

    #complete-btn {
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #complete-btn:hover { background: #ea6c0a; }
    #complete-btn.done { background: #4ade80; color: #1a1a1a; }

    #content {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 32px 80px;
      width: 100%;
    }

    #content h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    #content .chapter-tag {
      font-size: 12px;
      color: #f97316;
      font-weight: 600;
      margin-bottom: 16px;
      display: block;
    }

    #content .divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 24px 0;
    }

    #content p {
      font-size: 15px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 16px;
    }

    #content h3 {
      font-size: 17px;
      font-weight: 700;
      margin: 28px 0 12px;
    }

    #content ul, #content ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }

    #content li {
      font-size: 15px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 6px;
    }

    .callout {
      background: #fff7ed;
      border-left: 4px solid #f97316;
      border-radius: 4px;
      padding: 16px 20px;
      margin: 20px 0;
      font-size: 14px;
      line-height: 1.7;
      color: #7c3d12;
    }

    .practice-box {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 20px 24px;
      margin: 24px 0;
    }

    .practice-box h4 {
      font-size: 13px;
      font-weight: 700;
      color: #166534;
      margin-bottom: 10px;
    }

    .practice-box p {
      font-size: 14px;
      color: #166534;
      margin-bottom: 0;
    }

      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px 24px;
      margin: 16px 0;
      color: #e5e5e5;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;

      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;

      border: none;

    .nav-btn.next {
      background: #f97316;
      color: #fff;
    }

    @media (max-width: 768px) {

      #main { margin-left: 0; }

  const STORAGE_KEY = 'claude_ig_progress';
  let completed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let current = 0;

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
  }

  function updateProgress() {
    const pct = Math.round((completed.length / LESSONS.length) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${completed.length} / ${LESSONS.length} 完了`;
  }

  function buildNav() {
    const nav = document.getElementById('nav');
    nav.innerHTML = '';
    let lastChapter = '';

    LESSONS.forEach((lesson, i) => {
      if (lesson.chapter !== lastChapter) {
        const label = document.createElement('div');
        label.className = 'chapter-label';
        label.textContent = lesson.chapter;
        nav.appendChild(label);
        lastChapter = lesson.chapter;
      }

      const btn = document.createElement('button');
      btn.className = 'lesson-btn' + (i === current ? ' active' : '') + (completed.includes(i) ? ' done' : '');

      const svg = `<svg class="check" viewBox="0 0 20 20" fill="currentColor">
        <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/>
        ${completed.includes(i) ? '<path d="M6 10l3 3 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>': ''}
      </svg>`;

      btn.innerHTML = svg + lesson.title;
      btn.onclick = () => goto(i);
      nav.appendChild(btn);
    });
  }

  function goto(i) {
    current = i;
    const lesson = LESSONS[i];
    document.getElementById('content').innerHTML = lesson.content + `
      <div class="nav-btns">
        ${i > 0 ? `<button class="nav-btn prev" onclick="goto(${i-1})">← 前へ</button>` : ''}
        ${i < LESSONS.length - 1 ? `<button class="nav-btn next" onclick="goto(${i+1})">次へ →</button>` : ''}
      </div>
    `;
    document.getElementById('topbar-title').textContent = lesson.title;

    const btn = document.getElementById('complete-btn');
    if (completed.includes(i)) {
      btn.textContent = '✓ 完了済み';
      btn.className = 'done';
    } else {
      btn.textContent = '完了にする';
      btn.className = '';
    }

    buildNav();
    window.scrollTo(0, 0);
    document.getElementById('main').scrollTo(0, 0);
  }

  function toggleComplete() {
    if (completed.includes(current)) {
      completed = completed.filter(x => x !== current);
    } else {
      completed.push(current);
    }
    save();
    updateProgress();
    goto(current);
  }

  // 初期化
  buildNav();
  goto(0);
  updateProgress();
</script>
